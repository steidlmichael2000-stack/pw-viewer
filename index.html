<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Punktwolken-Viewer</title>

	<link rel="stylesheet" type="text/css" href="build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="libs/jstree/themes/mixed/style.css">
</head>

<body>
	<script src="libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="libs/spectrum/spectrum.js"></script>
	<script src="libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="libs/other/BinaryHeap.js"></script>
	<script src="libs/tween/tween.min.js"></script>
	<script src="libs/d3/d3.js"></script>
	<script src="libs/proj4/proj4.js"></script>
	<script src="libs/openlayers3/ol.js"></script>
	<script src="libs/i18next/i18next.js"></script>
	<script src="libs/jstree/jstree.js"></script>
	<script src="build/potree/potree.js"></script>
	<script src="libs/plasio/js/laslaz.js"></script>

	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px;">
		<div id="potree_render_area" style="background-image: url('build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"></div>
	</div>

	<script type="module">
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(1_000_000);
		viewer.loadSettingsFromURL();
		viewer.setBackground("skybox");
		viewer.loadGUI(() => {
			viewer.setLanguage('de');
			$("#menu_tools").next().show();
			$("#menu_clipping").next().show();
			$("#potree_sidebar_container").hide();

			// Hamburger-Icon: zusätzlich die Sidebar wirklich ein-/ausblenden
			// (Potrees toggleSidebar schiebt nur die Render-Fläche, blendet
			// die Sidebar selbst aber nicht aus).
			$(".potree_menu_toggle").on("click", () => {
				$("#potree_sidebar_container").toggle();
			});
		});

		const R2_BASE = "https://pub-a58f169a0a2e4229af6efe323f6632e2.r2.dev";
		const DEFAULT_PC = "geckenheim";

		// Punktwolken-Name aus URL-Parameter ?p=<name> auslesen.
		// Nur Kleinbuchstaben/Ziffern/_/- erlaubt, sonst Default.
		const params = new URLSearchParams(window.location.search);
		const rawName = params.get("p") || DEFAULT_PC;
		const pcName = /^[a-z0-9_-]+$/.test(rawName) ? rawName : DEFAULT_PC;

		const POINTCLOUD_URL = `${R2_BASE}/${pcName}/metadata.json`;
		const displayName = pcName.charAt(0).toUpperCase() + pcName.slice(1);

		viewer.setDescription(`${displayName} — Drohnenaufnahme (WebODM)`);

		Potree.loadPointCloud(POINTCLOUD_URL, displayName, e => {
			let scene = viewer.scene;
			let pointcloud = e.pointcloud;
			let material = pointcloud.material;
			material.size = 1;
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.shape = Potree.PointShape.SQUARE;

			scene.addPointCloud(pointcloud);
			viewer.fitToScreen();

			// =========================================================
			// Touch-Steuerung im Google-Earth-Stil
			// =========================================================
			// Wir fangen die Touch-Events VOR Potree ab (capture-Phase)
			// und stoppen die Weitergabe, damit Potrees OrbitControls
			// nicht "auch noch" was macht. Dann setzen wir selbst die
			// Delta-Werte (yawDelta, pitchDelta, panDelta, radiusDelta),
			// die Potrees Render-Loop pro Frame anwendet.
			//
			// Gesten:
			//   1 Finger drag           -> Pan (verschieben)
			//   2 Finger auseinander/zu -> Zoom
			//   2 Finger drehen         -> Yaw (Welt-Rotation)
			//   2 Finger vertikal       -> Pitch (Welt-Neigung)
			//
			// Empfindlichkeiten unten in SENS.* zum Nachtunen.

			const renderArea = document.getElementById("potree_render_area");

			const SENS = {
				pan: 1.0,       // pan-Empfindlichkeit
				zoomPinch: 40,  // Pinch: ratio^N
				zoomWheel: 40,  // Mausrad: Faktor N
				yaw: 1.5,       // 2-Finger-Drehen
				pitch: 2.0      // 2-Finger-vertikal
			};

			// Mausrad (Desktop-Zoom)
			renderArea.addEventListener('wheel', (ev) => {
				const view = viewer.scene.view;
				const dir = ev.deltaY > 0 ? 1 : -1;
				viewer.orbitControls.radiusDelta += dir * view.radius * 0.1 * SENS.zoomWheel;
			}, {passive: true});

			// Vorherige Touch-Positionen zwischen Events
			const stored = new Map();
			const captureOpts = {capture: true, passive: false};

			const rememberAll = (ev) => {
				stored.clear();
				for (const t of ev.touches) {
					stored.set(t.identifier, {x: t.pageX, y: t.pageY});
				}
			};

			renderArea.addEventListener('touchstart', (ev) => {
				ev.preventDefault();
				ev.stopImmediatePropagation();
				rememberAll(ev);
			}, captureOpts);

			renderArea.addEventListener('touchmove', (ev) => {
				ev.preventDefault();
				ev.stopImmediatePropagation();

				const oc = viewer.orbitControls;
				const view = viewer.scene.view;
				const w = renderArea.clientWidth;
				const h = renderArea.clientHeight;

				if (ev.touches.length === 1) {
					// 1 Finger: Pan
					const t = ev.touches[0];
					const prev = stored.get(t.identifier);
					if (prev) {
						oc.panDelta.x += (t.pageX - prev.x) / w * SENS.pan;
						oc.panDelta.y += (t.pageY - prev.y) / h * SENS.pan;
					}
					stored.set(t.identifier, {x: t.pageX, y: t.pageY});
				} else if (ev.touches.length === 2) {
					// 2 Finger: Pinch (Zoom) + Twist (Yaw) + Vertikal (Pitch)
					const t0 = ev.touches[0];
					const t1 = ev.touches[1];
					const p0 = stored.get(t0.identifier);
					const p1 = stored.get(t1.identifier);
					if (p0 && p1) {
						const pdx = p0.x - p1.x, pdy = p0.y - p1.y;
						const pdist = Math.hypot(pdx, pdy);
						const pang  = Math.atan2(pdy, pdx);
						const pcy   = (p0.y + p1.y) / 2;

						const cdx = t0.pageX - t1.pageX, cdy = t0.pageY - t1.pageY;
						const cdist = Math.hypot(cdx, cdy);
						const cang  = Math.atan2(cdy, cdx);
						const ccy   = (t0.pageY + t1.pageY) / 2;

						// Pinch -> Zoom
						if (pdist > 1) {
							const ratio     = cdist / pdist;
							const amplified = Math.pow(ratio, SENS.zoomPinch);
							const resolved  = view.radius + oc.radiusDelta;
							oc.radiusDelta += resolved / amplified - resolved;
						}

						// Twist -> Yaw
						let angleDelta = cang - pang;
						while (angleDelta >  Math.PI) angleDelta -= 2 * Math.PI;
						while (angleDelta < -Math.PI) angleDelta += 2 * Math.PI;
						oc.yawDelta -= angleDelta * SENS.yaw;

						// Vertikale Mittelpunkt-Bewegung -> Pitch
						oc.pitchDelta -= (ccy - pcy) / h * SENS.pitch;

						stored.set(t0.identifier, {x: t0.pageX, y: t0.pageY});
						stored.set(t1.identifier, {x: t1.pageX, y: t1.pageY});
					}
				}
			}, captureOpts);

			renderArea.addEventListener('touchend', (ev) => {
				ev.preventDefault();
				ev.stopImmediatePropagation();
				rememberAll(ev);
			}, captureOpts);

			renderArea.addEventListener('touchcancel', (ev) => {
				rememberAll(ev);
			}, captureOpts);
		});
	</script>
</body>
</html>
